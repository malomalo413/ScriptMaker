<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ScriptMaker Viewer</title>
  <meta name="theme-color" content="#111827">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="./css/viewer.css?v=21">
  <script src="../js/firebase-config.js?v=30" defer></script>
  <script src="../js/firebase-share.js?v=31" defer></script>
  <script src="./js/viewer.js?v=24" defer></script>
</head>
<body>
  <div id="viewerApp" class="viewer-app">
    <div id="viewerWallpaperA" class="viewer-wallpaper active"></div>
    <div id="viewerWallpaperB" class="viewer-wallpaper"></div>
    <header class="viewer-header">
      <div class="viewer-title-block">
        <p class="viewer-label">ScriptMaker Viewer</p>
        <h1 id="viewerTitle">&#21488;&#26412;</h1>
      </div>
      <div class="viewer-header-actions"><button id="viewerPdfButton" class="viewer-settings-button viewer-pdf-button hidden" type="button">PDF&#12391;&#20445;&#23384;</button><button id="viewerSettingsButton" class="viewer-settings-button" type="button" aria-haspopup="dialog">&#34920;&#31034;&#35373;&#23450;</button><button id="viewerLogoutButton" class="viewer-settings-button viewer-logout-button hidden" type="button">&#12525;&#12464;&#12450;&#12454;&#12488;</button></div>
    </header>
    <section class="viewer-display-mode-bar">
      <span>&#34920;&#31034;&#12514;&#12540;&#12489;</span>
      <label><input type="radio" name="viewerDisplayMode" value="chat"> &#12481;&#12515;&#12483;&#12488;&#22411;</label>
      <label><input type="radio" name="viewerDisplayMode" value="script"> &#21488;&#26412;&#22411;</label>
      <span id="viewerOrientationHint" class="viewer-orientation-hint hidden">&#27178;&#30011;&#38754;&#12391;&#38322;&#35239;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;</span>
    </section>
    <section id="viewerCountPanel" class="viewer-count-panel hidden">
      <details id="viewerCountDetails">
        <summary><span>&#25991;&#23383;&#25968;</span><strong id="viewerCountTotal">&#21512;&#35336;&#25991;&#23383;&#25968;&#65306;0&#25991;&#23383;</strong></summary>
        <div class="viewer-count-options">
          <label class="viewer-count-check"><input id="viewerShowNumbers" type="checkbox" checked> <span>&#30058;&#21495;&#34920;&#31034;</span></label>
          <label class="viewer-count-field viewer-exclude-field"><span><input id="viewerUseExcludeChars" type="checkbox"> &#38500;&#22806;&#12377;&#12427;&#25991;&#23383;</span><input id="viewerExcludeChars" type="text" placeholder="&#20363;&#65306;&#12289;&#12290;&#65281;&#65311;"></label>
        </div>
        <div id="viewerCountBreakdown" class="viewer-count-breakdown"></div>
      </details>
    </section>
    <main id="viewerTimeline" class="viewer-timeline"></main>
    <div id="viewerPrintPages" class="viewer-print-pages" aria-hidden="true"></div>
    <div id="viewerEmpty" class="viewer-empty hidden">
      <h2>&#20849;&#26377;&#12487;&#12540;&#12479;&#12364;&#12354;&#12426;&#12414;&#12379;&#12435;</h2>
      <p>Share&#12391;&#20316;&#25104;&#12375;&#12383;URL&#12363;&#12425;&#38283;&#12356;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;</p>
    </div>
    <div id="viewerSettingsPanel" class="viewer-settings-panel hidden" role="dialog" aria-modal="true" aria-labelledby="viewerSettingsTitle">
      <div class="viewer-settings-sheet">
        <div class="viewer-settings-head">
          <h2 id="viewerSettingsTitle">&#21491;&#20596;&#34920;&#31034;&#12461;&#12515;&#12521;&#12463;&#12479;&#12540;</h2>
          <button id="viewerSettingsClose" class="viewer-icon-button" type="button" aria-label="close">&#215; </button>
        </div>
        <p class="viewer-settings-help">&#12481;&#12455;&#12483;&#12463;&#12375;&#12383;&#12461;&#12515;&#12521;&#12463;&#12479;&#12540;&#12398;&#12475;&#12522;&#12501;&#12434;&#21491;&#20596;&#12395;&#34920;&#31034;&#12375;&#12414;&#12377;&#12290;</p>
        <div class="viewer-settings-actions">
          <button id="viewerAllLeft" type="button">&#20840;&#21729;&#24038;&#20596;</button>
          <button id="viewerAllRight" type="button">&#20840;&#21729;&#21491;&#20596;</button>
          <button id="viewerUseEditor" type="button">&#32232;&#38598;&#20596;&#35373;&#23450;&#12395;&#25147;&#12377;</button>
        </div>
        <div id="viewerCharacterOptions" class="viewer-character-options"></div>
      </div>
    </div>

    <div id="viewerAuthPanel" class="viewer-auth-panel hidden">
      <div class="viewer-auth-card">
        <p class="viewer-label">ScriptMaker Viewer</p>
        <h2>&#38322;&#35239;&#12497;&#12473;&#12527;&#12540;&#12489;</h2>
        <p>&#12371;&#12398;&#21488;&#26412;&#12399;&#12497;&#12473;&#12527;&#12540;&#12489;&#12391;&#20445;&#35703;&#12373;&#12428;&#12390;&#12356;&#12414;&#12377;&#12290;</p>
        <input id="viewerPasswordInput" type="password" autocomplete="current-password" placeholder="&#12497;&#12473;&#12527;&#12540;&#12489;">
        <button id="viewerPasswordSubmit" type="button">&#38283;&#12367;</button>
        <button id="viewerClearSavedPassword" class="viewer-secondary-button" type="button">&#20445;&#23384;&#12375;&#12383;&#12497;&#12473;&#12527;&#12540;&#12489;&#12434;&#21066;&#38500;</button>
        <div id="viewerPasswordMessage" class="viewer-auth-message"></div>
        <small>&#8251;GitHub Pages&#19978;&#12398;&#31777;&#26131;&#20445;&#35703;&#12391;&#12377;&#12290;</small>
      </div>
    </div>

  </div>
</body>
</html>
