<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>チャット型台本作成アシスタント</title>
  <meta name="description" content="スマホで使えるチャット型台本作成アプリ">
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="台本作成">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icons/icon-512.png">
  <link rel="stylesheet" href="./css/styles.css?v=24">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
  <script src="./js/app.js?v=24" defer></script>
</head>
<body class="auth-locked">

  <div id="editorAuthGate" class="editor-auth-gate">
    <div class="editor-auth-card">
      <p class="auth-label">ScriptMaker</p>
      <h1 id="editorAuthTitle">&#12497;&#12473;&#12527;&#12540;&#12489;</h1>
      <p id="editorAuthHelp" class="auth-help"></p>
      <input id="editorAuthPassword" type="password" autocomplete="current-password" placeholder="&#12497;&#12473;&#12527;&#12540;&#12489;">
      <input id="editorAuthConfirm" class="hidden" type="password" autocomplete="new-password" placeholder="&#12497;&#12473;&#12527;&#12540;&#12489;&#30906;&#35469;">
      <button type="button" onclick="submitEditorPassword()">&#38283;&#12367;</button>
      <div id="editorAuthMessage" class="auth-message"></div>
      <small>&#8251;GitHub Pages&#19978;&#12398;&#31777;&#26131;&#20445;&#35703;&#12391;&#12354;&#12426;&#12289;&#23436;&#20840;&#12394;&#12469;&#12540;&#12496;&#12540;&#35469;&#35388;&#12391;&#12399;&#12354;&#12426;&#12414;&#12379;&#12435;&#12290;</small>
    </div>
  </div>

<div id="openingView" class="opening-view">
    <div class="opening-overlay"></div>
    <div class="opening-content">
      <div class="top-tabs">
        <button class="tab-btn active">プロジェクト</button>
        <button class="tab-btn">出力</button>
      </div>
      <div class="folder-toolbar">
        <div class="folder-list" id="folderList"></div>
        <button class="folder-create-btn" onclick="createFolder()">+ &#12501;&#12457;&#12523;&#12480;</button>
      </div>
      <div class="project-list" id="projectList"></div>
      <button class="create-btn" onclick="openCreateProjectModal()">+ 新規プロジェクト作成</button>
    </div>
  </div>

  <div id="editorView" class="editor-view hidden">
    <div id="editorWallpaperLayer" class="editor-wallpaper-layer active"></div>
    <div id="editorWallpaperLayerNext" class="editor-wallpaper-layer"></div>
    <div class="nav-bar">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="project-title" id="projectTitle">プロジェクト名</div>
      <div class="nav-actions">
        <button class="nav-btn nav-icon-btn" id="undoBtn" onclick="undoProjectAction()" title="Undo">&#8630;</button>
        <button class="nav-btn nav-icon-btn" id="redoBtn" onclick="redoProjectAction()" title="Redo">&#8631;</button>
        <button class="nav-btn btn-nav-save" onclick="saveDataAlert()">保存</button>
        <button class="nav-btn btn-nav-export" onclick="exportDataAlert()">出力</button>
        <button class="nav-btn btn-nav-share" onclick="openShareModal()">&#20849;&#26377;</button>
        <button class="nav-btn btn-nav-wallpaper" onclick="openWallpaperModal()">壁紙</button>
        <button class="nav-btn btn-nav-mode" id="modeToggleBtn" onclick="toggleEditMode()">編集</button>
        <button class="nav-btn btn-nav-logout" onclick="logoutEditorAuth()">&#12525;&#12464;&#12450;&#12454;&#12488;</button>
      </div>
    </div>

    <div class="header-scroll-area">
      <div class="meta-stats" id="metaStats">
        <div class="count-controls">
          <label><input type="checkbox" id="excludePunctuationCheck">句読点を除く</label>
          <label><input type="checkbox" id="excludeCustomCheck">カスタム</label>
          <label><input type="checkbox" id="showTalkNumbersCheck" checked>&#30058;&#21495;&#34920;&#31034;</label>
          <label><input type="checkbox" id="outputTalkNumbersCheck">&#20986;&#21147;&#12395;&#30058;&#21495;</label>
          <input type="text" id="customExcludeChars" placeholder="除外する文字">
        </div>
        <div class="count-output" id="countOutput"></div>
      </div>
      <div class="batch-edit-bar" id="batchEditBar">
        <span id="selectedTalkCount">0件選択中</span>
        <div class="batch-edit-actions">
          <button class="btn-batch-clear" onclick="clearTalkSelection()">選択解除</button>
          <button class="btn-batch-delete" onclick="deleteSelectedTalks()">削除</button>
        </div>
      </div>
    </div>

    <div class="talk-timeline" id="talkTimeline"></div>

    <div class="bottom-input-bar" id="bottomInputBar">
      <div class="char-selector-container" id="charSelectorContainer"></div>
      <div class="inline-edit-status hidden" id="inlineEditStatus">
        <button type="button" onclick="cancelInlineTalkEdit()">キャンセル</button>
      </div>
      <div class="input-row">
        <textarea class="input-speech" id="inputSpeech" placeholder="セリフを入力..." rows="1"></textarea>
        <button class="send-btn" id="sendButton" onclick="sendMessage()">送信</button>
      </div>
    </div>
  </div>

  <div id="trashZone" class="trash-zone">
    🗑️
    <span>削除</span>
  </div>

  <div id="projectModal" class="custom-modal hidden">
    <div class="modal-content">
      <h4>新規プロジェクト作成</h4>
      <input type="text" id="newProjectName" placeholder="プロジェクト名を入力...">
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal('projectModal')">キャンセル</button>
        <button class="btn-modal-confirm" onclick="confirmCreateProject()">決定</button>
      </div>
    </div>
  </div>

  <div id="charModal" class="custom-modal hidden">
    <div class="modal-content">
      <h4 id="charModalTitle">キャラクター追加</h4>
      <div class="modal-row">
        <input type="text" id="newCharName" placeholder="キャラクター名を入力...">
      </div>
      
      <div class="file-input-row" id="pinchTouchArea">
        <label class="file-label" for="newCharAvatar">画像を選択</label>
        <input type="file" id="newCharAvatar" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
        <div id="avatarPreview" class="avatar-preview-box"></div>
      </div>

      <div class="modal-row-inline">
        <input type="checkbox" id="charRoundCheck" checked onchange="updatePreviewStyle()">
        <label for="charRoundCheck">アバターを円形（丸型）に収める</label>
      </div>
      <div class="modal-row-inline">
        <input type="checkbox" id="charProtagonistCheck">
        <label for="charProtagonistCheck">主人公として右側に表示する</label>
      </div>
      <div class="modal-row">
        <label style="display:flex; justify-content:space-between; color:#64748b; font-size:12px;">
          <span>画像周辺を2本指でピンチして拡大縮小</span>
          <span id="zoomVal" style="font-weight:bold; color:var(--primary-color);">100%</span>
        </label>
        <input type="range" id="charZoomSlider" min="50" max="300" value="100" step="2" oninput="updatePreviewStyle()">
      </div>

      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal('charModal')">キャンセル</button>
        <button class="btn-modal-confirm" id="charConfirmBtn" type="button" ontouchstart="confirmSaveCharacter(); return false;" onpointerdown="confirmSaveCharacter(); return false;" onclick="confirmSaveCharacter(); return false;">決定</button>
      </div>
    </div>
  </div>

  <div id="wallpaperModal" class="custom-modal hidden">
    <div class="modal-content">
      <h4>トーク画面の壁紙設定</h4>
      <div class="file-input-row">
        <label class="file-label" for="wallpaperInput">壁紙画像を選択</label>
        <input type="file" id="wallpaperInput" accept="image/*" style="display:none;" onchange="previewWallpaper(this)">
        <div id="wallpaperPreview" class="wallpaper-preview-box"></div>
      </div>
      <div class="modal-row">
        <label style="display:flex; justify-content:space-between; color:#64748b; font-size:12px;">
          <span>画像サイズ</span>
          <span id="wallpaperSizeVal" style="font-weight:bold; color:var(--primary-color);">100%</span>
        </label>
        <input type="range" id="wallpaperSizeSlider" min="100" max="250" value="100" step="2" oninput="updateWallpaperPreviewStyle()">
      </div>
      <div class="scene-wallpaper-section">
        <div class="modal-row-inline scene-wallpaper-toggle-row">
          <input type="checkbox" id="sceneWallpaperToggle" onchange="toggleSceneWallpaperControls()">
          <label for="sceneWallpaperToggle">&#12471;&#12540;&#12531;&#20999;&#12426;&#26367;&#12360;&#12434;&#26377;&#21177;&#21270;</label>
        </div>
        <div id="sceneWallpaperControls" class="scene-wallpaper-controls hidden">
          <div class="scene-wallpaper-head">
            <div>
              <strong>&#12471;&#12540;&#12531;&#20999;&#12426;&#26367;&#12360;</strong>
              <small>&#34920;&#31034;&#20013;&#12398;&#12475;&#12522;&#12501;&#30058;&#21495;&#12391;&#22721;&#32025;&#12434;&#20999;&#12426;&#26367;&#12360;&#12414;&#12377;</small>
            </div>
            <button type="button" class="btn-scene-add" onclick="addSceneWallpaper()">&#12471;&#12540;&#12531;&#36861;&#21152;</button>
          </div>
          <div id="sceneWallpaperList" class="scene-wallpaper-list"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="clearWallpaper()">削除</button>
        <button class="btn-modal-cancel" onclick="closeModal('wallpaperModal')">キャンセル</button>
        <button class="btn-modal-confirm" id="wallpaperConfirmBtn" type="button" ontouchstart="confirmWallpaper(); return false;" onpointerdown="confirmWallpaper(); return false;" onclick="confirmWallpaper(); return false;">決定</button>
      </div>
    </div>
  </div>

  <div id="aiConfigModal" class="custom-modal hidden">
    <div class="modal-content">
      <h4>🤖 AIシナリオ自動予測設定</h4>
      <div class="modal-row-inline">
        <input type="checkbox" id="aiToggle" checked onchange="updateAiStatus()">
        <label for="aiToggle">自動予測展開を有効化</label>
      </div>
      <div class="modal-row">
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="AI StudioのAPIキーを入力">
      </div>
      <div class="modal-actions">
        <button class="btn-modal-confirm" onclick="saveAiConfig()">閉じる</button>
      </div>
    </div>
  </div>

  <div id="outputModal" class="custom-modal hidden">
    <div class="modal-content output-modal-content">
      <h4>台本出力</h4>
      <textarea id="outputText" class="output-textarea" readonly></textarea>
      <div class="modal-actions output-modal-actions">
        <button class="btn-modal-cancel" type="button" onclick="closeModal('outputModal')">閉じる</button>
        <button class="btn-modal-cancel" type="button" onclick="downloadOutputText()">保存</button>
        <button class="btn-modal-confirm" type="button" onclick="copyOutputText()">コピー</button>
      </div>
    </div>
  </div>

  <div id="shareModal" class="custom-modal hidden">
    <div class="modal-content share-modal-content">
      <h4>&#20849;&#26377;URL&#12434;&#20316;&#25104;</h4>
      <p class="share-help">&#29694;&#22312;&#38283;&#12356;&#12390;&#12356;&#12427;&#12503;&#12525;&#12472;&#12455;&#12463;&#12488;&#12434;GitHub Pages&#19978;&#12398;Viewer&#12391;&#38283;&#12369;&#12427;&#20849;&#26377;URL&#12395;&#22793;&#25563;&#12375;&#12414;&#12377;&#12290;</p>
      <div class="modal-row"><label for="shareViewerPassword">Viewer&#38322;&#35239;&#12497;&#12473;&#12527;&#12540;&#12489;&#65288;&#20219;&#24847;&#65289;</label><input type="password" id="shareViewerPassword" autocomplete="new-password" placeholder="&#26410;&#35373;&#23450;&#12394;&#12425;&#12497;&#12473;&#12527;&#12540;&#12489;&#12394;&#12375;"></div>
      <div class="modal-row"><label for="shareGithubToken">GitHub token&#65288;&#20849;&#26377;&#12487;&#12540;&#12479;&#20445;&#23384;&#29992;&#65289;</label><input type="password" id="shareGithubToken" autocomplete="off" placeholder="repo contents write&#27177;&#38480;&#12398;token"></div>
      <p class="share-help">&#20849;&#26377;&#12487;&#12540;&#12479;&#12399;GitHub&#12398; <code>Share/data</code> &#12395;JSON&#12392;&#12375;&#12390;&#20445;&#23384;&#12375;&#12289;&#30701;&#12356;URL&#12434;&#30330;&#34892;&#12375;&#12414;&#12377;&#12290;</p>
      <textarea id="shareUrlText" class="share-url-textarea" readonly placeholder="&#30701;&#12356;&#20849;&#26377;URL"></textarea>
      <div class="share-meta" id="shareMetaText"></div>
      <div class="share-meta share-status" id="shareStatusText"></div>
      <div class="modal-actions share-modal-actions">
        <button class="btn-modal-cancel" type="button" onclick="closeModal('shareModal')">&#38281;&#12376;&#12427;</button>
        <button class="btn-modal-cancel" type="button" onclick="openSharedViewer()">Viewer&#12391;&#38283;&#12367;</button>
        <button class="btn-modal-cancel" type="button" onclick="publishShortShareUrl()">&#30701;&#12356;URL&#20316;&#25104;</button>
        <button class="btn-modal-cancel" type="button" onclick="selectShareUrl()">URL&#12434;&#36984;&#25246;</button>
        <button class="btn-modal-confirm" type="button" onclick="copyShareUrl()">URL&#12467;&#12500;&#12540;</button>
      </div>
    </div>
  </div>

</body>
</html>
